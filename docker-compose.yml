services:

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-auth_db}
      POSTGRES_USER:     ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Migrate  (runs once, applies all up migrations, then exits)
  # ---------------------------------------------------------------------------
  migrate:
    image: migrate/migrate:v4.17.1
    container_name: auth-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./sql/schema:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgresql://${POSTGRES_USER:-auth_user}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-auth_db}?sslmode=disable"
      - "up"
    # Restart on failure so it retries if postgres isn't FULLY ready yet
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Auth Service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Server
      PORT: "${PORT:-8080}"
      GIN_MODE: "${GIN_MODE:-debug}"
      # Database — POSTGRES_HOST forces the Docker network name.
      # database.go builds the DSN from these parts when DATABASE_URL is absent.
      POSTGRES_HOST:     "postgres"
      POSTGRES_PORT:     "5432"
      POSTGRES_USER:     "${POSTGRES_USER:-auth_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-secret}"
      POSTGRES_DB:       "${POSTGRES_DB:-auth_db}"
      # Redis
      REDIS_URL: "redis://redis:6379"
      # JWT / RSA
      PRIVATE_KEY_PATH:    "${PRIVATE_KEY_PATH:-./keys/private.pem}"
      ACCESS_TOKEN_EXPIRY:  "${ACCESS_TOKEN_EXPIRY:-15m}"
      REFRESH_TOKEN_EXPIRY: "${REFRESH_TOKEN_EXPIRY:-168h}"
      # OAuth
      GOOGLE_CLIENT_ID:     "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
    volumes:
      # Mount RSA private key from host; generate with: scripts/gen-keys.sh
      - ./keys:/app/keys:ro

volumes:
  postgres_data:
  redis_data:
