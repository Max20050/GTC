version: "3.9"

services:
  canvas-service:
    build: .
    ports:
      - "${PORT:-8082}:8082"
    environment:
      - PORT=${PORT:-8082}
      - MONGO_URI=mongodb://mongo:27017
      - DB_NAME=${DB_NAME:-canvas_db}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
